<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" image-rendering="pixelated" shape-rendering="crispEdges">
  <!-- Scroll body (parchment) -->
  <rect x="6" y="6" width="20" height="20" fill="#C8A030"/>
  <!-- Scroll inner (lighter parchment) -->
  <rect x="8" y="8" width="16" height="16" fill="#E8C060"/>
  <!-- Rolled ends (top) -->
  <rect x="4" y="4" width="24" height="4" fill="#7A5018"/>
  <rect x="6" y="4" width="20" height="2" fill="#A07020"/>
  <!-- Rolled ends (bottom) -->
  <rect x="4" y="24" width="24" height="4" fill="#7A5018"/>
  <rect x="6" y="26" width="20" height="2" fill="#A07020"/>
  <!-- Knobs (left) -->
  <rect x="2" y="6" width="4" height="2" fill="#5A3810"/>
  <rect x="2" y="24" width="4" height="2" fill="#5A3810"/>
  <!-- Knobs (right) -->
  <rect x="26" y="6" width="4" height="2" fill="#5A3810"/>
  <rect x="26" y="24" width="4" height="2" fill="#5A3810"/>
  <!-- Ink lines (text) -->
  <rect x="10" y="12" width="12" height="2" fill="#2A1408"/>
  <rect x="10" y="16" width="8" height="2" fill="#2A1408"/>
  <rect x="10" y="20" width="10" height="2" fill="#2A1408"/>
  <!-- Accent dot -->
  <rect x="10" y="10" width="2" height="2" fill="#C04020"/>
</svg>
