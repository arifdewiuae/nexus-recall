<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nexus Recall — Cursed Tome</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* =====================================================
   CURSED TOME — Nexus Recall single-file app
   ===================================================== */

:root {
  --bg-deep: #14080C;
  --bg-panel: #20101A;
  --bg-elev: #2C1822;
  --bg-elev-2: #3C2030;
  --border-outer: #000000;
  --border-light: #5E2438;
  --border-dark: #080306;
  --border-mid: #180A10;
  --accent: #E0B040;
  --accent-dim: #8E6020;
  --crimson: #C84050;
  --arcane: #9460E0;
  --ok: #6FCF7F;
  --err: #FF3D5A;
  --err-dim: #3A0F1A;
  --text: #F0D8B8;
  --text-dim: #7A5A48;
  --text-faint: #4A3A30;
  --glow: rgba(224,176,64,0.35);
  --glow-strong: rgba(224,176,64,0.55);

  --parchment-bg: #322214;
  --parchment-edge: #4E3520;
  --parchment-fg: #F0D8B0;
  --parchment-ink: #D8B888;
  --parchment-ink-strong: #E0B040;
  --parchment-ink-dim: #8C6A50;

  /* sprite palette */
  --sp-skin: #E8C098;
  --sp-skin-dark: #604030;
  --sp-hair: #3A1E10;
  --sp-hat: #3D1A2A;
  --sp-eye: #14080C;
  --sp-robe: #5A1A2A;
  --sp-armor: #6E3A28;
  --sp-chest-dark: #4A2818;
  --sp-chest-light: #8E5A30;
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  height: 100%;
  background: var(--bg-deep);
  color: var(--text);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 13px;
  line-height: 1.6;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
  position: relative;
}

/* Subtle CRT scanlines over everything */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0,
    transparent 3px,
    rgba(0,0,0,0.10) 3px,
    rgba(0,0,0,0.10) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

img, .sprite { image-rendering: pixelated; }

.pixel { font-family: 'Press Start 2P', monospace; letter-spacing: 0.5px; }

button { font-family: inherit; cursor: pointer; }
input, textarea { font-family: inherit; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--border-light); box-shadow: inset 0 0 0 2px var(--border-outer); }
::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

/* =====================================================
   PANELS / CHROME
   ===================================================== */
.panel {
  background: var(--bg-panel);
  box-shadow: 0 0 0 2px var(--border-outer), inset 0 0 0 2px var(--border-light);
  padding: 16px;
}
.panel-hero {
  background: var(--bg-panel);
  box-shadow:
    0 0 0 2px var(--border-outer),
    inset 2px 2px 0 0 var(--border-light),
    inset -2px -2px 0 0 var(--border-dark);
}
.panel-inset {
  background: var(--bg-deep);
  box-shadow: inset 0 0 0 2px var(--border-outer);
  padding: 12px;
}

/* =====================================================
   BUTTONS / CHIPS / BADGES
   ===================================================== */
.btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  background: var(--bg-elev);
  color: var(--text);
  padding: 9px 14px;
  border: none;
  cursor: pointer;
  box-shadow:
    0 0 0 2px var(--border-outer),
    inset 1px 1px 0 0 var(--border-light),
    inset -1px -1px 0 0 var(--border-dark);
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.btn:hover { background: var(--bg-elev-2); color: var(--accent); }
.btn:active, .btn.active {
  background: var(--bg-deep);
  box-shadow: 0 0 0 2px var(--border-outer), inset 1px 1px 0 0 var(--border-dark), inset -1px -1px 0 0 var(--border-light);
  transform: translate(1px,1px);
}
.btn:disabled { color: var(--text-dim); cursor: not-allowed; opacity: 0.5; }
.btn-primary { background: var(--accent); color: var(--bg-deep); }
.btn-primary:hover { background: var(--accent); filter: brightness(1.15); color: var(--bg-deep); }
.btn-danger { color: var(--crimson); }

.chip {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  padding: 7px 10px;
  background: var(--bg-elev);
  color: var(--text);
  box-shadow: 0 0 0 2px var(--border-outer);
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.chip-dim { color: var(--text-dim); }
.chip-accent { color: var(--accent); }

.badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  padding: 5px 9px;
  background: var(--bg-elev);
  color: var(--text-dim);
  box-shadow: 0 0 0 2px var(--border-outer);
  letter-spacing: 0.5px;
}
.badge::before {
  content: ''; width: 6px; height: 6px; background: currentColor; display: inline-block;
}
.badge.pending { color: var(--text-dim); }
.badge.indexing { color: var(--accent); }
.badge.indexing::before { animation: blink 1.2s steps(2) infinite; }
.badge.ready { color: var(--ok); }
.badge.error { color: var(--err); }

/* =====================================================
   LAYOUT
   ===================================================== */
#app {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
  position: relative;
}

.hud {
  display: flex; align-items: center; gap: 16px;
  padding: 12px 18px;
  background: var(--bg-panel);
  box-shadow: 0 0 0 2px var(--border-outer);
  position: relative; z-index: 5;
  flex-shrink: 0;
}
.hud .logo {
  display: flex; align-items: center; gap: 10px;
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  color: var(--text);
  letter-spacing: 1px;
}
.hud .logo .dot {
  width: 9px; height: 9px;
  background: var(--accent);
  box-shadow: 0 0 0 2px var(--bg-deep), 0 0 10px var(--accent);
}
.hud .spacer { flex: 1; }

.main {
  flex: 1; min-height: 0;
  display: flex;
  background: var(--bg-deep);
  padding: 12px;
  gap: 0;
}

.divider {
  width: 10px;
  background: var(--bg-deep);
  cursor: col-resize;
  position: relative;
  flex-shrink: 0;
}
.divider::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 4px; height: 30px;
  transform: translate(-50%,-50%);
  background: repeating-linear-gradient(to bottom,
    var(--border-light) 0, var(--border-light) 2px,
    transparent 2px, transparent 6px);
}

/* =====================================================
   TOME VIEWER (left pane)
   ===================================================== */
.tome {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  background: var(--bg-panel);
  box-shadow:
    0 0 0 2px var(--border-outer),
    inset 2px 2px 0 0 var(--border-light),
    inset -2px -2px 0 0 var(--border-dark);
}
.tabbar {
  display: flex;
  background: var(--bg-deep);
  padding: 10px 12px 0 12px;
  border-bottom: 2px solid var(--border-outer);
  overflow: hidden;
  gap: 0;
  flex-shrink: 0;
}
.tab {
  padding: 8px 14px 10px 14px;
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  background: transparent;
  cursor: pointer;
  position: relative;
  top: 2px;
  max-width: 220px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
.tab.active {
  background: var(--bg-panel);
  color: var(--accent);
  box-shadow: inset 0 2px 0 var(--accent);
}
.tab .close {
  background: transparent; border: none;
  color: inherit; font-family: inherit;
  font-size: 10px;
  padding: 0; opacity: 0.4;
  cursor: pointer;
}
.tab .close:hover { opacity: 1; color: var(--crimson); }

.tome-body {
  flex: 1; min-height: 0;
  padding: 16px;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.tome-toolbar {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 12px;
}
.tome-toolbar .filename {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  color: var(--text);
  letter-spacing: 0.5px;
  flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.parchment {
  flex: 1;
  background: var(--parchment-bg);
  color: var(--parchment-fg);
  padding: 28px 32px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.85;
  overflow: auto;
  box-shadow: inset 0 0 0 2px var(--border-outer);
  position: relative;
}
.parchment .doc-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 13px;
  color: var(--parchment-ink-strong);
  margin-bottom: 18px;
  letter-spacing: 1px;
}
.parchment p { margin: 0 0 16px 0; }

.chunk {
  transition: background 0.15s;
  padding: 1px 0;
  cursor: pointer;
}
.chunk.hl-1 {
  background: var(--accent);
  color: var(--bg-deep);
  padding: 2px 4px;
  font-weight: 600;
  box-shadow: 0 0 0 1px var(--border-outer);
}
.chunk.hl-2 {
  background: var(--accent);
  color: var(--bg-deep);
  padding: 1px 3px;
  opacity: 0.75;
}
.chunk.hl-3 {
  background: var(--accent);
  color: var(--bg-deep);
  padding: 1px 3px;
  opacity: 0.45;
}
.chunk.hl-4 {
  background: var(--crimson);
  color: var(--text);
  padding: 1px 3px;
  opacity: 0.55;
}
.chunk.focused {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  animation: chunk-pulse 0.8s ease-out;
}
@keyframes chunk-pulse {
  0% { box-shadow: 0 0 0 0 var(--glow-strong); }
  100% { box-shadow: 0 0 0 24px transparent; }
}

/* =====================================================
   ORACLE TERMINAL (right pane)
   ===================================================== */
.oracle {
  width: 440px;
  flex-shrink: 0;
  display: flex; flex-direction: column;
  background: var(--bg-panel);
  box-shadow:
    0 0 0 2px var(--border-outer),
    inset 2px 2px 0 0 var(--border-light),
    inset -2px -2px 0 0 var(--border-dark);
}
.oracle-header {
  padding: 12px 16px;
  border-bottom: 2px solid var(--border-outer);
  background: var(--bg-deep);
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.oracle-header .glow-dot {
  width: 8px; height: 8px;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
}
.oracle-header .title {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 1px;
}
.oracle-header .meta {
  margin-left: auto;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
}
.oracle-body {
  flex: 1; min-height: 0;
  padding: 16px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 16px;
}
.oracle-input-wrap {
  padding: 12px;
  background: var(--bg-deep);
  border-top: 2px solid var(--border-outer);
  flex-shrink: 0;
}
.oracle-input {
  display: flex; align-items: center; gap: 10px;
  padding: 8px;
  background: var(--bg-deep);
  box-shadow: inset 0 0 0 2px var(--border-outer);
}
.oracle-input .prompt {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  color: var(--accent);
}
.oracle-input input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  padding: 6px 0;
}
.oracle-input input::placeholder { color: var(--text-dim); }

.message {
  display: flex; gap: 10px; align-items: flex-start;
}
.portrait {
  width: 44px; height: 44px;
  background: var(--bg-deep);
  box-shadow: 0 0 0 2px var(--border-outer);
  display: grid; place-items: center;
  flex-shrink: 0;
}
.bubble {
  flex: 1; min-width: 0;
  padding: 12px 14px;
  background: var(--bg-panel);
  box-shadow: 0 0 0 2px var(--border-outer);
  font-size: 13px;
  line-height: 1.65;
}
.bubble.hero { background: var(--bg-elev); }
.bubble .name {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  color: var(--accent);
  margin-bottom: 8px;
  letter-spacing: 0.5px;
}
.bubble.hero .name { color: var(--text-dim); }
.citations {
  margin-top: 12px;
  display: flex; flex-wrap: wrap; gap: 6px;
}
.cite {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  padding: 5px 8px;
  background: var(--bg-deep);
  color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent);
  display: inline-flex; align-items: center; gap: 5px;
  letter-spacing: 0.5px;
  cursor: pointer;
  border: none;
  font-family: 'Press Start 2P', monospace;
}
.cite.tier-2 { color: var(--crimson); box-shadow: 0 0 0 2px var(--crimson); }
.cite:hover { background: var(--bg-elev); }

.typewriter::after {
  content: '';
  display: inline-block;
  width: 0.55em; height: 1em;
  background: currentColor;
  vertical-align: text-bottom;
  margin-left: 2px;
  animation: blink 0.8s steps(2) infinite;
}

/* =====================================================
   SIDEBAR / LIBRARY OVERLAY
   ===================================================== */
.library-toggle {
  background: var(--bg-elev);
  border: none;
  color: var(--text);
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  padding: 7px 10px;
  box-shadow: 0 0 0 2px var(--border-outer);
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  letter-spacing: 0.5px;
}
.library-toggle:hover { color: var(--accent); }

.library-pane {
  position: absolute;
  top: 64px; right: 12px;
  width: 360px;
  background: var(--bg-panel);
  box-shadow:
    0 0 0 2px var(--border-outer),
    inset 2px 2px 0 0 var(--border-light),
    inset -2px -2px 0 0 var(--border-dark);
  z-index: 50;
  max-height: calc(100% - 80px);
  display: flex; flex-direction: column;
}
.library-pane .head {
  padding: 12px 14px;
  border-bottom: 2px solid var(--border-outer);
  background: var(--bg-deep);
  display: flex; align-items: center; gap: 10px;
}
.library-pane .head .title {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 1px;
  flex: 1;
}
.library-pane .head .close {
  background: transparent; border: none;
  color: var(--text-dim);
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  cursor: pointer;
}
.library-pane .head .close:hover { color: var(--crimson); }
.library-pane .list {
  padding: 12px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 8px;
}
.file-row {
  padding: 10px 12px;
  background: var(--bg-deep);
  box-shadow: inset 0 0 0 2px var(--border-outer);
  display: flex; align-items: center; gap: 10px;
  cursor: pointer;
}
.file-row:hover { background: var(--bg-elev); }
.file-row.active { box-shadow: inset 0 0 0 2px var(--accent); }
.file-row .scroll-icon { width: 24px; height: 20px; flex-shrink: 0; }
.file-row .info { flex: 1; min-width: 0; }
.file-row .name {
  font-size: 12px; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.file-row .meta {
  font-size: 10px; color: var(--text-dim);
}
.file-row .del {
  background: transparent; border: none;
  color: var(--text-dim);
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  padding: 4px; cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s;
}
.file-row:hover .del { opacity: 1; }
.file-row .del:hover { color: var(--crimson); }

/* =====================================================
   DROP OVERLAY
   ===================================================== */
.drop-overlay {
  position: fixed; inset: 0;
  z-index: 8000;
  background: rgba(20, 8, 12, 0.92);
  display: none;
  align-items: center; justify-content: center;
  pointer-events: none;
}
.drop-overlay.show {
  display: flex;
  pointer-events: auto;
}
.drop-overlay .portal {
  width: 480px;
  padding: 60px 40px;
  text-align: center;
  background: var(--bg-deep);
  box-shadow:
    0 0 0 2px var(--border-outer),
    inset 0 0 0 2px var(--accent),
    0 0 60px var(--glow-strong);
  display: flex; flex-direction: column; align-items: center; gap: 20px;
  animation: drop-pulse 1.4s ease-in-out infinite;
}
@keyframes drop-pulse {
  0%, 100% { box-shadow: 0 0 0 2px var(--border-outer), inset 0 0 0 2px var(--accent), 0 0 60px var(--glow-strong); }
  50% { box-shadow: 0 0 0 2px var(--border-outer), inset 0 0 0 2px var(--accent), 0 0 100px var(--glow-strong); }
}
.drop-overlay .title {
  font-family: 'Press Start 2P', monospace;
  font-size: 18px;
  color: var(--accent);
  letter-spacing: 2px;
}
.drop-overlay .sub {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 1px;
}

/* =====================================================
   EMPTY STATE
   ===================================================== */
.empty-state {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 24px;
  position: relative;
  overflow: hidden;
  padding: 40px;
}
.empty-state::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 70%, var(--glow) 0%, transparent 50%);
  opacity: 0.5;
}
.empty-state::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
  background: var(--bg-panel);
  background-image: repeating-linear-gradient(45deg, var(--border-dark) 0, var(--border-dark) 8px, var(--bg-panel) 8px, var(--bg-panel) 16px);
  opacity: 0.3;
}
.empty-state > * { position: relative; z-index: 1; }
.empty-state .hero-row { display: flex; align-items: flex-end; gap: 40px; }
.empty-state .title {
  font-family: 'Press Start 2P', monospace;
  font-size: 18px;
  color: var(--text);
  letter-spacing: 2px;
  text-align: center;
}
.empty-state .sub {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 1px;
  text-align: center;
}
.empty-state .actions {
  display: flex; gap: 10px;
  margin-top: 8px;
}
.bob { animation: bob 1.8s ease-in-out infinite; }
@keyframes bob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}

/* =====================================================
   ORACLE EMPTY
   ===================================================== */
.oracle-empty {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px;
  padding: 30px;
  position: relative;
}
.oracle-empty .wiz-bob { animation: idle-blink 3.5s steps(2) infinite; }
@keyframes idle-blink {
  0%, 96%, 100% { transform: scaleY(1); }
  98% { transform: scaleY(0.1); }
}
.oracle-empty .title {
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  color: var(--text);
  letter-spacing: 1px;
  text-align: center;
}
.oracle-empty .sub {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: var(--accent);
  letter-spacing: 1px;
  text-align: center;
}
.oracle-empty .examples {
  display: flex; flex-direction: column; gap: 6px;
  margin-top: 8px;
  width: 100%;
}
.example-btn {
  background: var(--bg-elev);
  border: none;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 8px 10px;
  cursor: pointer;
  text-align: left;
  box-shadow: 0 0 0 2px var(--border-outer);
}
.example-btn:hover { background: var(--bg-elev-2); color: var(--accent); }

/* =====================================================
   INGESTION PROGRESS OVERLAY
   ===================================================== */
.ingest-card {
  margin: 12px;
  padding: 16px 18px;
  background: var(--bg-panel);
  box-shadow:
    0 0 0 2px var(--border-outer),
    inset 2px 2px 0 0 var(--border-light),
    inset -2px -2px 0 0 var(--border-dark);
}
.ingest-card .label {
  display: flex; justify-content: space-between;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  color: var(--text);
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.ingest-card .stat-bar {
  position: relative;
  height: 14px;
  background: var(--bg-deep);
  box-shadow: 0 0 0 2px var(--border-outer);

<script>
/* =====================================================
   NEXUS RECALL — app logic, single file, vanilla JS
   ===================================================== */

// ====== SPRITES (pixel grids) ======
const SPRITES = {
  wizard: [
    '....BBBBBB....',
    '...BPPPPPPB...',
    '..BPPPPPPPPB..',
    '..BPPWWWPPPB..',
    '..BPWSSSWPPB..',
    '.BPPWSKSWPPPB.',
    '.BPPWSSSWPPPB.',
    '.BPPWWWWWPPPB.',
    'BBBBBBBBBBBBBB',
    'BCCCCCCCCCCCCB',
    'BCCYYYYYYYYCCB',
    'BCYYCCCCCCYYCB',
    'BCYCSSSSSSCYCB',
    'BCCCCCCCCCCCCB',
  ],
  hero: [
    '....BBBBBB....',
    '...BHHHHHHB...',
    '..BHHHHHHHHB..',
    '..BHFFFFFFHB..',
    '..BFEEEFEEFB..',
    '.BFFFEFFFEFB.',
    '.BFFFFFFFFFB.',
    '..BFMMMMMFB...',
    'BBBBBBBBBBBBBB',
    'BAAAAAAAAAAAAB',
    'BAAGGGGGGGGAAB',
    'BAGGAAAAAAAAGB',
    'BAGAAAAAAAAGB.',
    'BAAAAAAAAAAAAB',
  ],
  adventurer: [
    '......BBBB......',
    '.....BHHHHB.....',
    '....BHHHHHHB....',
    '....BHFFFFHB....',
    '....BFEEFEFB....',
    '....BFFFFFFB....',
    '....BFMMMMFB....',
    '...BAAAAAAAAB...',
    '..BAAGGGGGGAAB..',
    '..BAGGAAAAGGAB..',
    '..BAGAAAAAAGB...',
    '...BAAAAAAAB....',
    '....BFFFFFFB....',
    '....BFF..FFB....',
    '....BBB..BBB....',
    '...BBB....BBB...',
  ],
  chest: [
    '.BBBBBBBBBBBB.',
    'BDDDDDDDDDDDDB',
    'BDLLLLLLLLLLDB',
    'BDLYYYYYYYYDB.',
    'BDLLLLLLLLLLDB',
    'BBBBBBBBBBBBBB',
    'BDDDDDDDDDDDDB',
    'BDLLLLKKLLLLDB',
    'BDLLLLKKLLLLDB',
    'BDDDDDDDDDDDDB',
    '.BBBBBBBBBB.',
  ],
  scroll: [
    '.BBBBBBBBBB.',
    'BPPPPPPPPPPB',
    'BPLLLLLLLLPB',
    'BPLDDDDDDLPB',
    'BPLDLLLLDLPB',
    'BPLDLLLLDLPB',
    'BPLDDDDDDLPB',
    'BPLLLLLLLLPB',
    'BPPPPPPPPPPB',
    '.BBBBBBBBBB.',
  ],
  sword: [
    '.....BB',
    '....BSB',
    '...BSSB',
    '..BSSB.',
    '.BSSB..',
    'BHBB...',
    'BHB....',
    '.B.....',
  ],
};

const PALETTES = {
  wizard: { B: '#000', P: 'var(--sp-skin)', W: 'var(--sp-hat)', S: 'var(--sp-eye)', K: 'var(--accent)', Y: 'var(--accent)', C: 'var(--sp-robe)' },
  hero: { B: '#000', H: 'var(--sp-hair)', F: 'var(--sp-skin)', E: 'var(--sp-eye)', M: 'var(--sp-skin-dark)', A: 'var(--sp-armor)', G: 'var(--accent)' },
  adventurer: { B: '#000', H: 'var(--sp-hair)', F: 'var(--sp-skin)', E: 'var(--sp-eye)', M: 'var(--sp-skin-dark)', A: 'var(--sp-armor)', G: 'var(--accent)' },
  chest: { B: '#000', D: 'var(--sp-chest-dark)', L: 'var(--sp-chest-light)', Y: 'var(--accent)', K: 'var(--accent)' },
  scroll: { B: '#000', P: 'var(--parchment-edge)', L: 'var(--parchment-bg)', D: 'var(--parchment-ink)' },
  sword: { B: '#000', S: 'var(--accent)', H: 'var(--crimson)' },
};

function renderSprite(name, scale = 3) {
  const grid = SPRITES[name];
  const pal = PALETTES[name];
  const dot = scale;
  const shadows = [];
  grid.forEach((row, y) => {
    [...row].forEach((ch, x) => {
      const color = pal[ch];
      if (!color) return;
      shadows.push(`${x * dot}px ${y * dot}px 0 0 ${color}`);
    });
  });
  const w = grid[0].length * dot;
  const h = grid.length * dot;
  return `<div class="sprite" style="position:relative;width:${w}px;height:${h}px;display:inline-block">
    <div style="position:absolute;top:0;left:0;width:${dot}px;height:${dot}px;box-shadow:${shadows.join(',')}"></div>
  </div>`;
}

// ====== STATE ======
const STATE = {
  scrolls: [],        // { id, name, content, chunks, status, addedAt, charCount }
  activeId: null,
  highlights: [],     // chunk IDs to highlight, in rank order
  chat: [],           // { id, role: 'user'|'oracle', text, citations? }
  ingest: null,       // { name, chunkProgress, embedProgress, total }
  libraryOpen: false,
  isOnline: navigator.onLine,
  showInstall: false,
};

// ====== STORAGE ======
const STORAGE_KEY = 'nexus-recall.v1';
function saveState() {
  try {
    const persist = {
      scrolls: STATE.scrolls,
      activeId: STATE.activeId,
      chat: STATE.chat.slice(-30),
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(persist));
  } catch (e) { /* quota etc */ }
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.scrolls) STATE.scrolls = data.scrolls;
    if (data.activeId) STATE.activeId = data.activeId;
    if (data.chat) STATE.chat = data.chat;
  } catch (e) { /* corrupt; ignore */ }
}

// ====== CHUNKING ======
function chunkText(text) {
  // Split on paragraphs first, then collapse small chunks together up to ~280 chars.
  const paras = text
    .split(/\n\s*\n/)
    .map((p) => p.trim())
    .filter(Boolean);

  const TARGET = 280;
  const chunks = [];
  let buf = '';
  for (const p of paras) {
    if (p.length > TARGET) {
      // split long paragraph on sentence boundaries
      if (buf) { chunks.push(buf); buf = ''; }
      const sentences = p.match(/[^.!?\n]+[.!?]+(\s|$)|[^.!?\n]+$/g) || [p];
      let sbuf = '';
      for (const s of sentences) {
        if (sbuf.length + s.length > TARGET && sbuf) {
          chunks.push(sbuf.trim());
          sbuf = '';
        }
        sbuf += s;
      }
      if (sbuf.trim()) chunks.push(sbuf.trim());
    } else if (buf.length + p.length + 2 > TARGET) {
      if (buf) chunks.push(buf);
      buf = p;
    } else {
      buf = buf ? buf + '\n\n' + p : p;
    }
  }
  if (buf) chunks.push(buf);
  return chunks.map((text, i) => ({
    id: 'c' + Math.random().toString(36).slice(2, 9),
    index: i,
    text,
  }));
}

// ====== RETRIEVAL (TF-IDF) ======
const STOPWORDS = new Set('a an and are as at be but by for from has have how i if in into is it its of on or that the their then there these they this to was we were what when where which while who will with you your'.split(' '));

function tokenize(s) {
  return s.toLowerCase()
    .replace(/[^a-z0-9\s']/gi, ' ')
    .split(/\s+/)
    .filter((w) => w.length >= 2 && !STOPWORDS.has(w));
}

function indexChunks(chunks) {
  const docFreq = {};
  const tfs = chunks.map((c) => {
    const tf = {};
    for (const t of tokenize(c.text)) tf[t] = (tf[t] || 0) + 1;
    for (const t of Object.keys(tf)) docFreq[t] = (docFreq[t] || 0) + 1;
    return tf;
  });
  const N = chunks.length;
  const idf = {};
  for (const [t, df] of Object.entries(docFreq)) {
    idf[t] = Math.log(1 + N / df);
  }
  return chunks.map((c, i) => ({
    ...c,
    tf: tfs[i],
    norm: Object.values(tfs[i]).reduce((s, v) => s + v, 0) || 1,
    _idf: idf,
  }));
}

function retrieve(query, chunks, k = 4) {
  if (!chunks || chunks.length === 0) return [];
  const qToks = tokenize(query);
  if (qToks.length === 0) return [];
  const idf = chunks[0]._idf || {};
  const scored = chunks.map((c) => {
    let score = 0;
    for (const t of qToks) {
      const tf = c.tf[t] || 0;
      if (tf > 0) score += tf * (idf[t] || 1.0);
    }
    return { ...c, score: score / Math.sqrt(c.norm) };
  });
  scored.sort((a, b) => b.score - a.score);
  return scored.filter((c) => c.score > 0).slice(0, k);
}

// ====== ORACLE ANSWER (scripted; grounded in retrieved chunks) ======
// To use a real LLM, replace the body of this function.
const FLAVOR_OPENERS = [
  'Hark, traveller.',
  'The scrolls speak thus:',
  "Aye — the tome's verdict:",
  'Heed the writ of the ancients.',
  'By the binding of the parchment,',
];
const FLAVOR_CONNECTORS = [
  'Further still, the scrolls record:',
  'And it is also written:',
  'The lesser passages add:',
  'A neighboring fragment whispers:',
];
const NO_ANSWER = [
  'The scrolls hold no answer to that. Bring more tomes, or rephrase the quest.',
  'Silence from the parchment. Try other words, or load another scroll.',
  'No matching passages were found in the loaded scrolls.',
];

function firstSentence(s) {
  const m = s.match(/[^.!?\n]+[.!?]/);
  return m ? m[0].trim() : s.trim();
}

function oracleAnswer(query, retrieved, scroll) {
  if (retrieved.length === 0) {
    return {
      text: NO_ANSWER[Math.floor(Math.random() * NO_ANSWER.length)],
      citations: [],
    };
  }
  const opener = FLAVOR_OPENERS[Math.floor(Math.random() * FLAVOR_OPENERS.length)];
  const top = retrieved[0];
  let body = '“' + firstSentence(top.text) + '”';
  if (retrieved[1] && retrieved[1].score > retrieved[0].score * 0.5) {
    const conn = FLAVOR_CONNECTORS[Math.floor(Math.random() * FLAVOR_CONNECTORS.length)];
    body += ' ' + conn + ' “' + firstSentence(retrieved[1].text) + '”';
  }
  return {
    text: opener + ' ' + body,
    citations: retrieved.map((c, i) => ({
      chunkId: c.id,
      scrollId: scroll.id,
      label: scroll.name,
      chunkIndex: c.index,
      tier: i < 2 ? 1 : 2,
    })),
  };
}

// ====== RENDER ======
const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => [...root.querySelectorAll(sel)];

function getActiveScroll() {
  return STATE.scrolls.find((s) => s.id === STATE.activeId) || null;
}

function escapeHtml(s) {
  return s.replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}

function chunkClasses(chunkId) {
  const idx = STATE.highlights.indexOf(chunkId);
  if (idx === -1) return 'chunk';
  if (idx === 0) return 'chunk hl-1';
  if (idx === 1) return 'chunk hl-2';
  if (idx === 2) return 'chunk hl-3';
  return 'chunk hl-4';
}

function renderTomeBody() {
  const scroll = getActiveScroll();
  if (!scroll) return '';
  if (scroll.status === 'indexing') {
    return `
      <div class="tome-body">
        ${renderIngestCard(scroll)}
      </div>
    `;
  }
  return `
    <div class="tome-body">
      <div class="tome-toolbar">
        <span class="filename">📜 ${escapeHtml(scroll.name)}</span>
        <span class="chip chip-dim">${scroll.chunks.length} CHUNKS</span>
        <span class="chip chip-dim">${(scroll.charCount / 1000).toFixed(1)}K CHARS</span>
      </div>
      <div class="parchment" id="parchment">
        <div class="doc-title">${escapeHtml(scroll.name.replace(/\.[^.]+$/, '').toUpperCase())}</div>
        ${scroll.chunks.map((c) => `
          <p><span class="${chunkClasses(c.id)}" data-action="focus-chunk" data-chunk-id="${c.id}">${escapeHtml(c.text)}</span></p>
        `).join('')}
      </div>
    </div>
  `;
}

function renderIngestCard(scroll) {
  const total = scroll.chunks.length || 1;
  const chunkPct = STATE.ingest?.chunkProgress || total;
  const embedPct = STATE.ingest?.embedProgress || 0;
  const ok = (v) => v >= total ? 'ok' : '';
  function bar(value, max, cls = '') {
    return `<div class="stat-bar ${cls}">
      ${Array.from({ length: max }).map((_, i) => `<div class="seg ${i < value ? 'filled' : ''}"></div>`).join('')}
    </div>`;
  }
  return `
    <div class="ingest-card">
      <div class="label"><span>CHUNKING</span><span style="color:var(--accent)">${chunkPct}/${total}</span></div>
      ${bar(chunkPct, total, ok(chunkPct))}
      <div class="sub">splitting ${escapeHtml(scroll.name)} into semantic chunks…</div>
    </div>
    <div class="ingest-card">
      <div class="label"><span>EMBEDDING</span><span style="color:var(--crimson)">${embedPct}/${total}</span></div>
      ${bar(embedPct, total, embedPct >= total ? 'ok' : 'amber')}
      <div class="sub">encoding via local TF-IDF · grounding the scroll…</div>
    </div>
  `;
}

function renderTome() {
  if (STATE.scrolls.length === 0) {
    return `
      <div class="tome">
        <div class="empty-state">
          <div class="hero-row">
            <div class="bob">${renderSprite('adventurer', 4)}</div>
            <div>${renderSprite('chest', 4)}</div>
          </div>
          <div class="title">NO SCROLLS LOADED</div>
          <div class="sub">▸ BEGIN YOUR QUEST</div>
          <div class="actions">
            <button class="btn btn-primary" data-action="open-file">⚔ LOAD SCROLL</button>
            <button class="btn" data-action="load-sample">SUMMON SAMPLE</button>
          </div>
        </div>
      </div>
    `;
  }
  return `
    <div class="tome">
      <div class="tabbar">
        ${STATE.scrolls.map((s) => `
          <div class="tab ${s.id === STATE.activeId ? 'active' : ''}" data-action="set-active" data-scroll-id="${s.id}">
            <span>${escapeHtml(s.name.toUpperCase().slice(0, 28))}</span>
            <button class="close" data-action="delete-scroll" data-scroll-id="${s.id}" title="Burn this scroll">×</button>
          </div>
        `).join('')}
        <div style="flex:1"></div>
        <button class="library-toggle" data-action="toggle-library" style="margin: 4px 0 4px auto;">
          📚 LIBRARY (${STATE.scrolls.length})
        </button>
      </div>
      ${renderTomeBody()}
    </div>
  `;
}

function renderChat() {
  if (STATE.chat.length === 0) {
    return `
      <div class="oracle-empty">
        <div class="wiz-bob">${renderSprite('wizard', 5)}</div>
        <div class="title">THE ORACLE AWAITS</div>
        <div class="sub">▸ YOUR QUESTION</div>
        ${STATE.scrolls.length > 0 ? `
          <div class="examples">
            <button class="example-btn" data-action="example">What is this scroll about?</button>
            <button class="example-btn" data-action="example">Summarize the key points.</button>
            <button class="example-btn" data-action="example">What does it say about the main concept?</button>
          </div>
        ` : `
          <div class="sub" style="color:var(--text-dim); margin-top: 12px;">LOAD A SCROLL FIRST</div>
        `}
      </div>
    `;
  }
  return STATE.chat.map((m) => {
    const sprite = m.role === 'user' ? renderSprite('hero', 2) : renderSprite('wizard', 2);
    const name = m.role === 'user' ? 'YOU' : 'THE ORACLE';
    const bubbleCls = m.role === 'user' ? 'bubble hero' : 'bubble';
    const typing = m.streaming ? 'typewriter' : '';
    return `
      <div class="message">
        <div class="portrait">${sprite}</div>
        <div class="${bubbleCls}">
          <div class="name">${name}</div>
          <div class="${typing}">${escapeHtml(m.text)}</div>
          ${m.citations && m.citations.length ? `
            <div class="citations">
              ${m.citations.map((c, i) => `
                <button class="cite ${c.tier === 2 ? 'tier-2' : ''}" data-action="jump-citation" data-chunk-id="${c.chunkId}" data-scroll-id="${c.scrollId}">
                  ${c.tier === 1 ? '◆' : '◇'} ${escapeHtml(c.label)} · §${c.chunkIndex + 1}
                </button>
              `).join('')}
            </div>
          ` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function renderOracle() {
  const hasScrolls = STATE.scrolls.length > 0;
  const activeScroll = getActiveScroll();
  const readyScroll = activeScroll && activeScroll.status === 'ready';
  const placeholder = !hasScrolls ? 'Load a scroll first…' :
                       !readyScroll ? 'Awaiting indexing…' :
                       'Ask the oracle…';
  return `
    <div class="oracle">
      <div class="oracle-header">
        <div class="glow-dot"></div>
        <div class="title">ORACLE</div>
        <div class="meta">${activeScroll ? activeScroll.chunks.length + ' CHUNKS · GROUNDED' : 'IDLE'}</div>
      </div>
      <div class="oracle-body" id="oracle-body">
        ${renderChat()}
      </div>
      <div class="oracle-input-wrap">
        <div class="oracle-input">
          <span class="prompt">►</span>
          <input id="ask" type="text" placeholder="${placeholder}" ${!readyScroll ? 'disabled' : ''} autocomplete="off" spellcheck="false" />
          <button class="btn btn-primary" data-action="cast" ${!readyScroll ? 'disabled' : ''}>CAST</button>
        </div>
      </div>
    </div>
  `;
}

function renderHud() {
  const activeScroll = getActiveScroll();
  return `
    <div class="hud">
      <div class="logo">
        <span class="dot"></span>
        <span>NEXUS<span style="color:var(--text-dim)">·</span>RECALL</span>
      </div>
      <div class="spacer"></div>
      <div class="chip">
        <span class="chip-dim">MODEL</span>
        <span class="chip-accent">TF-IDF · LOCAL</span>
      </div>
      <div class="chip">
        <span class="chip-dim">SCROLLS</span>
        <span>${String(STATE.scrolls.length).padStart(2, '0')}</span>
      </div>
      <button class="btn" data-action="open-file">⚔ LOAD</button>
    </div>
  `;
}

function renderLibrary() {
  if (!STATE.libraryOpen) return '';
  return `
    <div class="library-pane">
      <div class="head">
        <div class="title">LIBRARY</div>
        <button class="close" data-action="toggle-library">×</button>
      </div>
      <div class="list">
        ${STATE.scrolls.length === 0
          ? `<div style="padding: 20px; text-align: center; color: var(--text-dim); font-size: 11px;">No scrolls yet. Drag one in.</div>`
          : STATE.scrolls.map((s) => `
            <div class="file-row ${s.id === STATE.activeId ? 'active' : ''}" data-action="set-active" data-scroll-id="${s.id}">
              <div class="scroll-icon">${renderSprite('scroll', 2)}</div>
              <div class="info">
                <div class="name">${escapeHtml(s.name)}</div>
                <div class="meta">${(s.charCount / 1000).toFixed(1)}K chars · ${s.chunks.length} chunks</div>
              </div>
              <span class="badge ${s.status}">${s.status.toUpperCase()}</span>
              <button class="del" data-action="delete-scroll" data-scroll-id="${s.id}" title="Delete">×</button>
            </div>
          `).join('')
        }
      </div>
    </div>
  `;
}

function render() {
  const app = $('#app');
  app.innerHTML = `
    ${renderHud()}
    <div class="main">
      ${renderTome()}
      <div class="divider"></div>
      ${renderOracle()}
    </div>
    ${renderLibrary()}
  `;
  // Render the sprite that lives outside #app (drop overlay, install toast)
  $('#drop-chest').innerHTML = renderSprite('chest', 5);
  $('#install-sword').innerHTML = renderSprite('sword', 3);

  // Auto-scroll oracle body to bottom
  const body = $('#oracle-body');
  if (body) body.scrollTop = body.scrollHeight;

  // If chunk was just focused, scroll it into view
  if (focusChunkAfterRender) {
    requestAnimationFrame(() => {
      const el = document.querySelector(`[data-chunk-id="${focusChunkAfterRender}"]`);
      if (el) {
        el.classList.add('focused');
        const parchment = $('#parchment');
        if (parchment) {
          const elTop = el.getBoundingClientRect().top - parchment.getBoundingClientRect().top + parchment.scrollTop;
          parchment.scrollTo({ top: Math.max(0, elTop - 80), behavior: 'smooth' });
        }
        setTimeout(() => el.classList.remove('focused'), 900);
      }
      focusChunkAfterRender = null;
    });
  }
}

let focusChunkAfterRender = null;

// ====== INGEST ======
async function ingestFile(file) {
  const text = await file.text();
  await ingestText(file.name, text);
}

async function ingestText(name, text) {
  const id = 'sc_' + Math.random().toString(36).slice(2, 9);
  const rawChunks = chunkText(text);
  const scroll = {
    id,
    name,
    content: text,
    charCount: text.length,
    chunks: [],
    status: 'indexing',
    addedAt: Date.now(),
  };
  STATE.scrolls.push(scroll);
  STATE.activeId = id;
  STATE.ingest = { chunkProgress: 0, embedProgress: 0, total: rawChunks.length, name };
  render();

  // Animate chunking
  for (let i = 0; i < rawChunks.length; i++) {
    scroll.chunks.push(rawChunks[i]);
    STATE.ingest.chunkProgress = i + 1;
    if (i % 2 === 0 || i === rawChunks.length - 1) render();
    await sleep(40);
  }

  // Animate embedding (compute TF-IDF once at end)
  const indexed = indexChunks(scroll.chunks);
  for (let i = 0; i < indexed.length; i++) {
    scroll.chunks[i] = indexed[i];
    STATE.ingest.embedProgress = i + 1;
    if (i % 2 === 0 || i === indexed.length - 1) render();
    await sleep(35);
  }

  scroll.status = 'ready';
  STATE.ingest = null;
  saveState();
  render();
}

const SAMPLE_TEXT = `# The Codex of Retrieval

## I. The Premise

In ages past, the sages devised an art known as Retrieval Augmented Generation. By this craft, a language model — limited in its memory — could draw upon great libraries of external knowledge at the moment of speaking. Each scroll is broken into fragments, each fragment given a coordinate in a vast vector realm, and from that realm the most relevant fragments are summoned to answer any question.

## II. On the Chunking of Scrolls

The manner of cleaving scrolls into chunks is no idle matter. Crude blade-work — cutting every N characters — sunders sentences mid-thought and leaves the retriever grasping at half-meanings. Wiser is the practice of semantic chunking, which respects the natural seams of paragraphs and sentences. Yet wiser still is hierarchical chunking, in which a scroll is divided first by its sections, then by its paragraphs, then by its sentences — and the retriever may roam at the level that best suits the question.

A chunk too large drowns the signal; a chunk too small dissolves the context. The sages of yore settled upon a target of two hundred and fifty to five hundred tokens — neither feast nor famine. Overlap between chunks of some forty to eighty tokens is recommended; this prevents a vital fact from being orphaned at the edge of a fragment.

## III. On Embeddings

To embed a chunk is to assign it a position in a high-dimensional space — typically of seven hundred and sixty-eight or one thousand five hundred and thirty-six dimensions — such that chunks of similar meaning sit near one another. The embedding is computed by a transformer model trained on great corpora; the resulting vector serves as a key under which the chunk may be retrieved.

Cosine similarity is the favored measure of distance. Two chunks pointing in the same direction in this vector realm are deemed semantically akin, regardless of the magnitude of their vectors.

## IV. On Retrieval

At query time, the question is itself embedded. The retriever searches the vector index for the K nearest neighbors — commonly four to twelve — and these chunks become the grounding context for the generative model.

Approximate Nearest Neighbor algorithms — HNSW, IVF, and their kin — make this search tractable over millions of chunks. The trade-off is recall versus latency: an exact search is slow but complete; an approximate search is fast but may miss some matches.

## V. On Re-Ranking

The first pass of retrieval returns candidates by vector similarity alone. A more discerning judgment may then be applied: a cross-encoder model reads the question and each candidate chunk together and assigns a relevance score. The top few survive to the prompt.

Re-ranking is computationally costly per pair but applied to only twenty or fifty candidates; the total budget remains modest. The lift in quality is often substantial — particularly on questions where lexical overlap is misleading.

## VI. On Citations

A grounded answer cites its sources. Each fragment that contributed to the response should be addressable — by document, by page, by section — so that the seeker may verify the claim. The oracle that cannot cite is the oracle that may not be trusted.`;

// ====== ASK / RETRIEVE / ANSWER ======
async function ask(query) {
  const scroll = getActiveScroll();
  if (!scroll || scroll.status !== 'ready') return;

  // Add user message
  STATE.chat.push({ id: 'm' + Math.random().toString(36).slice(2, 9), role: 'user', text: query });

  // Add streaming oracle stub
  const mid = 'm' + Math.random().toString(36).slice(2, 9);
  STATE.chat.push({ id: mid, role: 'oracle', text: '', streaming: true });
  render();

  // Retrieve
  await sleep(400);
  const retrieved = retrieve(query, scroll.chunks, 4);
  STATE.highlights = retrieved.map((c) => c.id);
  render();

  // Generate
  await sleep(250);
  const { text, citations } = oracleAnswer(query, retrieved, scroll);

  // Stream the response character by character
  const msg = STATE.chat.find((m) => m.id === mid);
  msg.text = '';
  msg.citations = null;
  for (let i = 0; i < text.length; i++) {
    msg.text = text.slice(0, i + 1);
    if (i % 3 === 0) render();
    await sleep(15);
  }
  msg.text = text;
  msg.citations = citations;
  msg.streaming = false;
  saveState();
  render();
}

function sleep(ms) { return new Promise((r) => setTimeout(r, ms)); }

// ====== EVENT HANDLERS ======
document.addEventListener('click', (e) => {
  const action = e.target.closest('[data-action]')?.dataset.action;
  if (!action) return;
  const t = e.target.closest('[data-action]');

  // Don't bubble close-tab into set-active
  if (action !== 'delete-scroll' && action !== 'close-tab' && e.target.tagName === 'BUTTON' && e.target.classList.contains('close')) return;

  switch (action) {
    case 'open-file':
      $('#file-input').click();
      break;
    case 'load-sample':
      ingestText('The Codex of Retrieval.md', SAMPLE_TEXT);
      break;
    case 'set-active': {
      e.stopPropagation();
      const id = t.dataset.scrollId;
      STATE.activeId = id;
      STATE.highlights = [];
      STATE.libraryOpen = false;
      saveState();
      render();
      break;
    }
    case 'delete-scroll': {
      e.stopPropagation();
      const id = t.dataset.scrollId;
      STATE.scrolls = STATE.scrolls.filter((s) => s.id !== id);
      if (STATE.activeId === id) {
        STATE.activeId = STATE.scrolls[0]?.id || null;
        STATE.chat = [];
      }
      STATE.highlights = [];
      saveState();
      render();
      break;
    }
    case 'toggle-library':
      STATE.libraryOpen = !STATE.libraryOpen;
      render();
      break;
    case 'cast': {
      const input = $('#ask');
      const q = input.value.trim();
      if (q) {
        input.value = '';
        ask(q);
      }
      break;
    }
    case 'example': {
      $('#ask').value = t.textContent.trim();
      $('#ask').focus();
      break;
    }
    case 'focus-chunk': {
      const id = t.dataset.chunkId;
      focusChunkAfterRender = id;
      render();
      break;
    }
    case 'jump-citation': {
      const chunkId = t.dataset.chunkId;
      const scrollId = t.dataset.scrollId;
      if (STATE.activeId !== scrollId) {
        STATE.activeId = scrollId;
      }
      focusChunkAfterRender = chunkId;
      render();
      break;
    }
    case 'install-accept':
    case 'install-dismiss':
      $('#install-toast').classList.remove('show');
      sessionStorage.setItem('install-dismissed', '1');
      break;
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.activeElement?.id === 'ask') {
    const input = $('#ask');
    const q = input.value.trim();
    if (q) {
      input.value = '';
      ask(q);
    }
  }
  if (e.key === 'Escape') {
    if (STATE.libraryOpen) {
      STATE.libraryOpen = false;
      render();
    }
  }
});

// ====== DRAG & DROP ======
let dragCounter = 0;
document.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragCounter++;
  $('#drop-overlay').classList.add('show');
});
document.addEventListener('dragover', (e) => { e.preventDefault(); });
document.addEventListener('dragleave', (e) => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter <= 0) {
    dragCounter = 0;
    $('#drop-overlay').classList.remove('show');
  }
});
document.addEventListener('drop', async (e) => {
  e.preventDefault();
  dragCounter = 0;
  $('#drop-overlay').classList.remove('show');
  const files = [...(e.dataTransfer?.files || [])];
  for (const f of files) {
    if (/\.(txt|md|markdown)$/i.test(f.name) || f.type === 'text/plain' || f.type === 'text/markdown') {
      await ingestFile(f);
    } else {
      alert('Only .txt and .md files are accepted in this build. (' + f.name + ' was skipped.)');
    }
  }
});

$('#file-input').addEventListener('change', async (e) => {
  const files = [...(e.target.files || [])];
  for (const f of files) {
    await ingestFile(f);
  }
  e.target.value = '';
});

// ====== OFFLINE DETECTION ======
function updateOnline() {
  STATE.isOnline = navigator.onLine;
  const banner = $('#offline-banner');
  if (STATE.isOnline) {
    banner.classList.remove('show');
  } else {
    banner.classList.add('show');
    $('#offline-retry').textContent = 'local-only mode';
  }
}
window.addEventListener('online', updateOnline);
window.addEventListener('offline', updateOnline);

// ====== PWA INSTALL ======
let deferredInstall = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstall = e;
  if (!sessionStorage.getItem('install-dismissed')) {
    setTimeout(() => $('#install-toast').classList.add('show'), 3000);
  }
});
document.addEventListener('click', (e) => {
  if (e.target.closest('[data-action="install-accept"]') && deferredInstall) {
    deferredInstall.prompt();
    deferredInstall = null;
  }
});

// ====== INIT ======
loadState();
// re-build the IDF index for previously stored scrolls (their _idf was stripped during JSON serialization)
for (const s of STATE.scrolls) {
  if (s.status === 'ready' && s.chunks.length) {
    s.chunks = indexChunks(s.chunks);
  }
}
updateOnline();
render();

</script>
